# https://developers.home-assistant.io/docs/add-ons/configuration#add-on-config
name: Bambuddy
version: "0.2.4.1"
slug: bambuddy
description: Bambuddy is a powerful, self-hosted print archive and management system for Bambu Lab 3D printers.
url: "https://github.com/connormxy/homeassistant-addon-bambuddy"
arch:
  - armhf
  - armv7
  - aarch64
  - amd64
  - i386
init: false
role: homeassistant
privileged:
  - NET_RAW
homeassistant_api: true
options:
  debug: false
schema:
  debug: bool
map:
  - share:rw
host_network: true
webui: http://[HOST]:8000
watchdog: http://[HOST]:8000/health
