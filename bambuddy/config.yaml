# https://developers.home-assistant.io/docs/add-ons/configuration#add-on-config
name: Bambuddy
version: "0.2.4"
slug: bambuddy
description: Bambuddy is a powerful, self-hosted print archive and management system for Bambu Lab 3D printers.
url: "https://github.com/connormxy/homeassistant-addon-bambuddy"
arch:
  - armhf
  - armv7
  - aarch64
  - amd64
  - i386
init: false
hassio_role: homeassistant
privileged:
  - NET_RAW
homeassistant_api: true
options:
  debug: false
schema:
  debug: bool
ports:
  8000/tcp: null
ports_description:
  8000/tcp: Web UI without Ingress
ingress: true
ingress_port: 8099
ingress_stream: true
panel_icon: mdi:printer-3d
panel_title: Bambuddy
watchdog: http://[HOST]:[PORT:8000]/health
