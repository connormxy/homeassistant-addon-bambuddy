# https://developers.home-assistant.io/docs/add-ons/configuration#add-on-config
name: Bambuddy
version: "0.2.4-1"
slug: bambuddy
description: Bambuddy is a powerful, self-hosted print archive and management system for Bambu Lab 3D printers.
url: "https://github.com/connormxy/homeassistant-addon-bambuddy"
arch:
  - armhf
  - armv7
  - aarch64
  - amd64
  - i386
init: false
hassio_role: homeassistant
privileged:
  - NET_RAW
homeassistant_api: true
options:
  debug: false
  orcaslicer_api_url: "http://localhost:3003"
  bambu_studio_api_url: "http://localhost:3001"
  preferred_slicer: "bambu_studio"
  mfa_encryption_key: ""
  database_url: ""
  virtual_printer_pasv_address: ""
  mqtt_enabled: false
  mqtt_broker: "core-mosquitto"
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  mqtt_topic_prefix: "bambuddy"
  mqtt_use_tls: false
schema:
  debug: bool
  orcaslicer_api_url: str?
  bambu_studio_api_url: str?
  preferred_slicer: list(bambu_studio|orcaslicer)?
  mfa_encryption_key: password?
  database_url: password?
  virtual_printer_pasv_address: str?
  mqtt_enabled: bool?
  mqtt_broker: str?
  mqtt_port: int(1,65535)?
  mqtt_username: str?
  mqtt_password: password?
  mqtt_topic_prefix: str?
  mqtt_use_tls: bool?
map:
  - share:rw
host_network: true
webui: http://[HOST]:[PORT:8000]
watchdog: http://[HOST]:[PORT:8000]/health
